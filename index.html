<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Comprometido</title>
<style>
    body {
        background-color: black;
        color: red;
        font-family: monospace;
        text-align: center;
        padding-top: 100px;
        animation: glitch 0.2s infinite;
    }

    @keyframes glitch {
        0% { transform: translate(1px, 1px); }
        50% { transform: translate(-1px, -1px); }
        100% { transform: translate(1px, -1px); }
    }

    h1 {
        font-size: 40px;
        text-shadow: 0 0 10px red;
    }

    p {
        font-size: 18px;
        color: #ff4d4d;
    }

    .box {
        border: 2px solid red;
        padding: 20px;
        margin: 20px auto;
        width: 80%;
        max-width: 500px;
        box-shadow: 0 0 20px red;
    }
</style>
</head>

<body>

<h1>⚠ SISTEMA COMPROMETIDO ⚠</h1>

<div class="box">
    <p>Seu site foi corrompido por MALWARE</p>
    <p>Arquivos sendo criptografados...</p>
    <p id="progress">0%</p>
</div>

<p>NÃO FECHE ESTA PÁGINA</p>

<script>
let progress = 0;
let element = document.getElementById("progress");

setInterval(() => {
    if (progress < 100) {
        progress += Math.floor(Math.random() * 10);
        if (progress > 100) progress = 100;
        element.innerText = progress + "%";
    }
}, 500);

// Fake alert depois de alguns segundos
setTimeout(() => {
    alert("ATENÇÃO: Sistema invadido. Ação necessária imediatamente.");
}, 3000);
</script>

</body>
</html>
